global:
  image:
    registry: "767397961866.dkr.ecr.us-east-1.amazonaws.com"
  tagCluster: "fft-prod-1"
  tagEnvironment: "prod"
  tagNamespace: "" # Default to chart namespace

anchors:
  tagEnv: &Env prod
  fftVersion: &FFTVersion "234"

baseDomain: "prod-public.finchai.com"
additionalDomains: ["prod.finchai.com"]

externalDns:
  enabled: true
  hostnamePrefix: "eks-"

externalSecrets:
  enabled: true

secrets:
  geocodeStreets:
    externalSecrets:
      remoteId: "/finch/fft/prod/geocode/apikey"
  usageDbConnection:
    externalSecrets:
      remoteId: "/finch/fft/prod/fftws/usage_db_conn"
  fftDemositeFeedbackDb:
    externalSecrets:
      remoteId: "/finch/fft/prod/minisite/feedback_db"
  fftDemositeGoogleAnalyticsId:
    externalSecrets:
      remoteId: "/finch/fft/prod/minisite/google_analytics"
  usersJson:
    name: ""
  sslCert:
    name: ""
  usersLicense:
    name: ""

  reportsOpenAiKey:
    externalSecrets:
      remoteId: "/finch/fft/prod-1/reports/openai-api-key"
  reportsTavilyKey:
    externalSecrets:
      remoteId: "/finch/fft/prod-1/reports/tavily/key"



aws:
  enabled: true
  acmCertArn: "arn:aws:acm:us-east-1:559100300467:certificate/a3aac082-fd92-4834-81ac-8820a08f5d5e" # prod.finchai.com
  additionalAcmCerts:
    - "arn:aws:acm:us-east-1:559100300467:certificate/a7aa8ab6-c17f-492e-a161-f4792a4e408f" # finchcomputing.com


agentic_entity_services:
  enabled: false
  ingress:
    enabled: true
  replicaCount: 0
  pdbMinAvail: 0
  env: 
#      - name: FFTENRICH_URL
#        value: "http://agentic-entity-service.prod-b.svc.cluster.local:8080/enrich/v3"
#      - name: KB_URL
#        value: "http://agentic-entity-service.prod-b.svc.cluster.local:8080/api/v1/collections/{collection}/documents/query"

      FFTENRICH_URL: "https://ees-service.prod-a.svc.cluster.local:443/enrich/v3"    
      KB_URL: "https://finchdb-service.prod-a.svc.cluster.local:443/api/v1/collections/{collection}/documents/query"
#      ENABLE_GEO_TAGGER: "true"      
        

