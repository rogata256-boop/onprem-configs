fft_demosite:
  nodePort: ""
  enabled: true
  ingress:
    enabled: true
    albScheme: "internet-facing"
    tlsEnabled: "false"
  replicaCount: 2
  pdbMinAvail: 1


fft_ws:
  nodePort: ""
  enabled: true
  ingress:
    enabled: true
    albScheme: "internet-facing"
    tlsEnabled: false
  logAllDetail: false
  replicaCount: 3
  pdbMinAvail: 2
  redisConnection: "prod-valkey-q2pbt5.serverless.use1.cache.amazonaws.com:6379" #"qa-valkey-sxi44i.serverless.use1.cache.amazonaws.com:6379"
  metricsRedisHost: "none"
  operationsEnvironment: "prod-a"
  extraAnnotations:
  fluentbit.io/exclude: "true"
  diagLogLevel: "info"
  loggingSidecar:
    enabled: true
    graylogHost: "graylog-prod-data.inf.finchai.com"
 # This value is passed from the top level values.yaml and
 # is configured via the package-json file
 # packageJsonConfigMapName: ""
  resources:
    limits:
      cpu: 512m
      memory: 2Gi
    requests:
      cpu: 512m
      memory: 2Gi
  env:
  #   AGENTIC_SERVICE_URL: "https://agentic-entity-service.prod-a.svc.cluster.local:443"
  #  ARTICLE_EXTRACTOR_URL: "http://eks-extract-article-prod-b.prod-public.finchai.com:9191/api/v1/extract-article"
  #   ssmAuthKeyString: "/finch/fft/qa-1/fft-auth"
     REDIS_CONN: "prod-valkey-q2pbt5.serverless.use1.cache.amazonaws.com:6379" 
 
  extraEnv:
    - name: REDIS_CA_CERT_URL
      value: "https://www.amazontrust.com/repository/AmazonRootCA1.pem" 
    - name: SSM_AUTH_KEY
      value: "/finch/fft/prod/fft-auth" #"none"
    - name: REGION
      value: "us-east-1"
    - name: USE_REDIS_TLS
      value: "true"
#    - name: MAX_REQUEST_SIZE_KB
    - name: KB_EDIT_URL
      value:  "none" #"http://10.6.16.59:8080" #8084
    - name: LOG_ALL_DETAIL
      value: "false" 
    - name: TRANS_LANGS
      value: "en,ar,ru,zh" 
    - name: MAX_REQUEST_SIZE_KB
      value: "2024"




