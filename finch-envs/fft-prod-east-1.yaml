ees:
  enabled: true
  ingress:
    enabled: true
  replicaCount: 3 #4
  pdbMinAvail: 2
  env:
    EES_TIMEOUT_TAGGERS: "360000"
    EES_TIMEOUT_PLUGINS: "360000"
    EES_EXCLUDE_TYPES: "ORGANIZATION/TEST,LOCATION,GROUP" #"ORGANIZATION/TEST,LOCATION"
    LOCATION_FIND: "true" 

