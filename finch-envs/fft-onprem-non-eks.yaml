# ------------------------------------------------------------------------------
# fft_demosite — React UI front-end
#
# Exposed on NodePort 30080.  Access via: http://<node-ip>:30080
# ------------------------------------------------------------------------------
fft_demosite:
  # NodePort for direct browser access without an ingress controller.
  # Accessible at http://<any-cluster-node-ip>:30080
  nodePort: "30080"
  enabled: true
  image:
    tag: "4.28.0"
  ingress:
    enabled: false
  replicaCount: 1
  pdbMinAvail: 0
  env:
    # REQUIRED: Set to the browser-accessible URL of the fft_ws API.
    # For NodePort access this is typically: http://<node-ip>:30081
    # This URL must be reachable from the end-user's browser.
    WEB_SERVICE_URL: "" # e.g. "http://fft-node.customer.internal:30081"

    # Air-gapped / restricted environment settings:
    # Disable the embedded map widget (requires internet).
    MAP_DISABLE: "true"
    # Disable all outbound external URL links in the UI.
    EXTERNAL_URLS_DISABLE: "true"
    # Maximum number of documents shown in the Recent Documents list.
    MAX_RECENT_DOCS: "12"
    # Disable mail features if no SMTP relay is available.
    MAIL_SERVER_DISABLE: "true"

    # Optional — uncomment and set as needed:
    #MAIL_SERVER_HOST: "smtp.customer.internal"
    #MAIL_SERVER_PORT: "25"
    #MAIL_SERVER_FROM_EMAIL: "no-reply@customer.internal"
    #SUPPORT_EMAIL: "support@customer.internal"
    #SALES_EMAIL: "sales@customer.internal"
    #FEEDBACK_EMAIL: "feedback@customer.internal"
    #SENTIMENT_MODEL: "financialTopics"
    #SUPPORTED_SOURCE_TRANSLATIONS: "nl,fr,de,es,ru,uk,ar,zh"

# ------------------------------------------------------------------------------
# fft_ws — Core API gateway / orchestrator
#
# Exposed on NodePort 30081.  Access via: http://<node-ip>:30081
#
# REQUIRED: Redis must be available before deployment. Deploy Redis in-cluster
# or on a separate VM and set redisConnection below.
# Example in-cluster Redis: kubectl apply -f <your-redis-deployment>.yaml
# ------------------------------------------------------------------------------
fft_ws:
  # NodePort for direct API access without an ingress controller.
  # Accessible at http://<any-cluster-node-ip>:30081
  nodePort: "30081"
  enabled: true
  image:
    tag: "11.13.8"
  ingress:
    enabled: false
  logAllDetail: false
  replicaCount: 1
  pdbMinAvail: 0

  # Redis is not provided for non-EKS on-prem deployments.
  # Set to "none" to disable Redis-backed session caching.
  redisConnection: "none"

  metricsRedisHost: "none"
  operationsEnvironment: "fft-onprem"

  # No logging sidecar — Graylog is an external service not available in
  # an air-gapped environment.
  loggingSidecar:
    enabled: false

  # No extra pod annotations needed without Fluent Bit / ALB
  extraAnnotations: {}

  diagLogLevel: "info"

  resources:
    limits:
      cpu: 512m
      memory: 2Gi
    requests:
      cpu: 512m
      memory: 2Gi

  env:
    KB_DMS_URL: "none"

  extraEnv:
    # SSM_AUTH_KEY: 'none' disables AWS SSM-based auth key lookup.
    - name: SSM_AUTH_KEY
      value: "none"
    # Maximum request body size in KB.
    - name: MAX_REQUEST_SIZE_KB
      value: "2024"
    # Languages supported for translation.
    - name: TRANS_LANGS
      value: "en,ar,ru,zh"
    # Encrypted input handling.
    - name: ENCRYPTED_INPUT
      value: "true"
    # NOTE: REDIS_CA_CERT_URL and REGION are intentionally omitted.
    # REDIS_CA_CERT_URL downloads an Amazon Root CA cert from the internet.
    # REGION is not required outside of AWS.
    # If your Redis uses TLS with a custom CA, add:
    # - name: USE_REDIS_TLS
    #   value: "true"
    # - name: REDIS_CA_CERT
    #   value: "<base64-encoded-ca-cert>"  # or mount via a volume

