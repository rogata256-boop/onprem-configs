# ==============================================================================
# FFT On-Prem Non-EKS Environment Values
#
# Use this file when deploying FFT on a plain Kubernetes cluster (e.g. kubeadm
# on EC2 or bare-metal VMs) WITHOUT the following AWS-managed dependencies:
#
#   - No ALB / cloud load balancer
#   - No Ingress controller (all ingress resources disabled)
#   - No ExternalDNS
#   - No ExternalSecrets (AWS SSM / Secrets Manager)
#   - No AWS Valkey / ElastiCache
#   - No outbound internet access (fully air-gapped)
#
# Services communicate via cluster-internal DNS:
#   <service-name>.<namespace>.svc.cluster.local
#
# External access to the demosite and API is provided via Kubernetes NodePort
# services (ports 30080 and 30081 by default).
#
# BEFORE INSTALLING — pre-create all required secrets:
#   kubectl create secret generic users-json --namespace fft \
#     --from-file=users.json=users.json \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# REQUIRED customer actions (search for REQUIRED below):
#   1. Set global.image.registry to your local container registry
#   2. Set fft_ws.redisConnection to your Redis host:port
#   3. Set fft_demosite.env.WEB_SERVICE_URL to the browser-accessible API URL
# ==============================================================================

global:
  image:
    # REQUIRED: Set to your local/on-prem container registry.
    # Images must be mirrored from ECR before deployment.
    # Example: registry: "registry.customer.internal"
    registry: ""
  tagCluster: "onprem-ec2"
  tagEnvironment: "fft-onprem"
  tagNamespace: "" # Defaults to chart namespace

baseDomain: "" # Set to your internal domain if used for DNS

# ExternalDNS is an EKS / Route 53 integration — disabled for non-EKS
externalDns:
  enabled: false

# ExternalSecrets pulls from AWS SSM / Secrets Manager — disabled for non-EKS
# All secrets must be pre-created manually with kubectl before deployment.
externalSecrets:
  enabled: false

secrets:
  # REQUIRED: users.json license secret must be pre-created before install.
  # See INSTALLATION.md — Secrets Configuration.
  usersJson:
    name: "users-json"

  # Optional: set the k8s secret name if the relevant secret is pre-created.
  # Leave as "" to omit the secret from the deployment.
  geocodeStreets:
    name: ""
  databaseConnection:
    name: ""
  usageDbConnection:
    name: ""
  fftDemositeFeedbackDb:
    name: ""
  fftDemositeGoogleAnalyticsId:
    name: ""
  sslCert:
    name: ""
  usersLicense:
    name: ""
  reportsOpenAiKey:
    name: ""
  reportsTavilyKey:
    name: ""

# AWS ALB / ACM integration — disabled for non-EKS
aws:
  enabled: false

# ==============================================================================
# Services — ingress disabled for all services.
# Backend NLP services are ClusterIP (cluster-internal only).
# fft_demosite and fft_ws expose NodePorts for direct browser / API access.
# ==============================================================================

