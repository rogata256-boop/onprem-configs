    enabled: true
  replicaCount: 1
  pdbMinAvail: 0
  env:
    TS_JOB_QUEUE_SIZE: "8" 

disambig:
  enabled: true
  image:
    tag: "1.16.0"
  ingress:
    enabled: true
    tlsEnabled: true
  replicaCount: 1
  pdbMinAvail: 0
  resources:
    limits:
      cpu: 16
      memory: 31Gi
    requests:
      cpu: 16
      memory: 31Gi
  env:
    #     FE_URL: "feature-extraction-service.fft-qa-1.svc.cluster.local"
    #    FDB_URL: "http://finchdb-service.fft-qa-1.svc.cluster.local:8084"
    DISAMBIG_DEBUG: "false"

ees:
  enabled: true
  image:
    tag: "19.10.1.52"
  ingress:
    enabled: true
  replicaCount: 1
  pdbMinAvail: 0
  env:
    #ETCD_TARGET: # defaults to https://etcd.<namespace>.svc.cluster.local:2379
    EES_TIMEOUT_TAGGERS: "360000"
    EES_TIMEOUT_PLUGINS: "360000"
    LOCATION_FIND: "true"
    EES_EXCLUDE_TYPES: "ORGANIZATION/TEST,LOCATION,GROUP"
  resources:
    limits:
      cpu: 8
      memory: 16Gi
    requests:
      cpu: 8
      memory: 16Gi

