global:
  image:
    registry: "767397961866.dkr.ecr.us-east-1.amazonaws.com"
  tagCluster: "qa-1"
  tagEnvironment: "fft-qa-1"
  tagNamespace: "" # Default to chart namespace

baseDomain: "finchai.com"
additionalDomains: ["qa.finchai.com"]

anchors:
  tagEnv: &Env fft-qa-1
  fftVersion: &FFTVersion "234"

# Sets CPU/memory on ALL podType: gpu services (coref, fin_topic_sentiment, ner_en, relationships, tagger_biztop).
# All enabled GPU services use .2xlarge instances (8 vCPU / 32Gi) so one default covers all.
# If translations are enabled later (g6.4xlarge: 16 vCPU / 64Gi), add per-service resources overrides.
podTypeResources:
  gpu:
    enabled: true
    resources:
      requests:
        cpu: "7000m"
        memory: "28Gi"
        nvidia.com/gpu: "1"
      limits:
        cpu: "7000m"
        memory: "28Gi"
        nvidia.com/gpu: "1"

externalDns:
  enabled: true
  hostnamePrefix: "eks-"

externalSecrets:
  enabled: true

secrets:
  geocodeStreets:
    externalSecrets:
      remoteId: "/finch/fft/qa-1/geocode/apikey"
  databaseConnection:
    externalSecrets:
      remoteId: "" #"/finch/fft/qa-1/fftws/database_connection"
  usageDbConnection:
    externalSecrets:
      remoteId: "/finch/fft/qa-1/fftws/usage_db_conn"
  fftDemositeFeedbackDb:
    externalSecrets:
      remoteId: "/finch/fft/qa-1/minisite/feedback_db"
  fftDemositeGoogleAnalyticsId:
    externalSecrets:
      remoteId: "/finch/fft/qa-1/minisite/google_analytics"
  usersJson:
    name: ""
  sslCert:
    name: ""
  usersLicense:
    name: '' #"users-license" 
  reportsOpenAiKey:
    externalSecrets:
      remoteId: "/finch/fft/demo-1/reports/openai-api-key"
  reportsTavilyKey:
    externalSecrets:
      remoteId: "/finch/fft/demo-1/reports/tavily/key"

aws:
  enabled: true
  acmCertArn: "arn:aws:acm:us-east-1:533266973280:certificate/46217010-c61c-4fe8-8fc7-d7ae397fa42f" # finchai
  additionalAcmCerts:
    [
      "arn:aws:acm:us-east-1:533266973280:certificate/d13608ac-4c7b-475a-a36a-9dc397fc350d",
    ]
  albSchemeDefault: "internal"

agentic_entity_services:
  ingress:
    enabled: true
    image:
    tag: "1.1.13"
  replicaCount: 1
  pdbMinAvail: 0
  env:
    #FFTENRICH_URL: # defaults to https://ees-service.<namespace>.svc.cluster.local:443/enrich/v3
    #KB_URL: # defaults to https://finchdb-service.<namespace>.svc.cluster.local:443/api/v1/collections/{collection}/documents/query
