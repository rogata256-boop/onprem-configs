finchdb:
  enabled: true
  ingress:
    enabled: true
  replicaCount: 1
  pdbMinAvail: 0
  image:
    repository: finchai/finchdb
    tag: "235.3"  
  data:
    initCopyEnabled: false
    dms:
      enabled: false
      image:
        tag: "6.0.3"  





finchdb_writeable:
  # -- Toggle deployment of finchdb_writable
  enabled: false

  # -- Toggle priorityClass of finchdb
  priorityClass:
    name: "high-priority-finchai"
    value: 1000
    globalDefault: false
    description: "This is a high-priority class for the most critical workloads."

  # -- exposed ingress and service port
  portExternal: "443"
  # -- exposed ingress and service port for dms
  portExternalDms: "444"
  # -- exposed ingress and service port for the tcp router
  portExternalRouter: "445"
  # -- port used within the container
  portContainer: "8080"
  # -- port used within the container for dms
  portContainerDms: "8083"
  # -- port used within the container for the tcp router
  portContainerRouter: "8444" #"40000"

  ingress:
    # -- Toggle finchdb ingress
    enabled: false
    # -- Ingress healthcheck path
    healthcheckPath: "/api/v1/systemHealth"
    # -- ALB Target Group Attributes string
    albTargetGroupAttributes: "load_balancing.algorithm.type=round_robin"
    tlsEnabled: true 


  replicaCount: 1
  pdbMinAvail: 1
  appName: finchdb-app
  componentName: finchdb
  image:
    repository: finchai/finchdb-upgrade
    tag: "232.3" #.1"
  tagTag: finchdb

  # -- The name of the ConfigMap containing the filter_file.json configuration; set to "" to disable mounting.  Requires a ConfigMap with .data["filter_file.json"] containing the filter_file.json configuration
  filterFileJsonConfigMapName: "" #filter-file
  # -- The path into which the ConfigMap will inject the filter_file.json configuration in the finchdb container, no trailing slash
  filterFileJsonConfigMapFilepath: "/opt/FinchDB/data/filters"

  # App Environment Vars
  # -- "TRUE" or "FALSE" - controls whether the startup scripts run or not. Used for debugging
  env: 
    START: "TRUE"
    MODE: "WRITE" 
    MIGRATE: "FALSE" 
    FILTER_ENTITIES: "FALSE" #FALSE
    DMS_FFT_HOST: "ees-service.fft-perf-1.svc.cluster.local" #http
    DMS_FFT_PORT: "443"
    DMS: "TRUE" 
    DMS_KV_HOST: "etcd.fft-perf-1.svc.cluster.local:2379" #"fft-deployment-etcd.finchai.svc.cluster.local:2379"  #"http://fft-deployment-etcd.finchai.svc.cluster.local:2379"
  # -- Deprecated, use .data.dms.enabled; "TRUE" or "FALSE" - determines whether to install DMS or not. If "TRUE", the DMS data image must be present.
  #envDMS: "TRUE"
  # -- FQDN of the redis host. Only used if DMS is "TRUE"
  # @default -- The Redis Service Hostname
  #envDMS_REDIS_HOST: ""
  # -- fft service host for DMS use. Only used if DMS is "TRUE"
  #envDMS_KV_HOST: "http://fft-deployment-etcd.finchai.svc.cluster.local:2379"  #"http://etcd.finchai.svc.cluster.local:2379"
  # @default -- The FFT Service Hostname
  #envDMS_FFT_HOST: "fft-service.finchai.svc.cluster.local"
  # -- PORT of the FFT host/ALB. Only used if DMS is "TRUE"
  # @default -- The FFT Service Port
  #envDMS_FFT_PORT: "8080"
  # -- "READ", "WRITE"
  #env: 
  #  MODE: "WRITE"
  # --- "TRUE" or "FALSE"
  #env:
  #  MIGRATE: "False" #"FALSE"
  # --- "TRUE" or "FALSE"
  #env:
  #  FILTER_ENTITIES: "False"

  data:
    # -- Copy DMS service from init container for writable FDB;
    initCopyEnabled: true
    # -- Storage class name for data volumes
    # @default -- "fdb-data-sc-<namespace>"
    dataStorageClassName: ""
    dms:
      enabled: true
      mountPath: /opt/FinchDB/dms
      volumeSize: "1Gi"
      image:
        repository: finchai/finchdb-data-dms
        tag: "6.0.2"
    people:
      enabled: true
      # -- "READ", "WRITE", "NONE"
      mode: "WRITE"
    orgs:
      enabled: true
      # -- "READ", "WRITE", "NONE"
      mode: "WRITE"
    things:
      enabled: true
      # -- "READ", "WRITE", "NONE"
      mode: "WRITE"
    dataVolume:
      enabled: true
      mountPath: /opt/FinchDB/data
      volumeSize: "30Gi"
      resources: {}

  resources:
    requests:
      memory: "50Gi"
      cpu: "10000m"
    limits:
      memory: "50Gi"
      cpu: "10000m"

  # -- Additional env applied to the pod spec; list of name-value pairs
  extraEnv: []
  # -- Additional envFrom applied to the pod spec; list of configMapRef/secretRef
  extraEnvFrom: []
  # -- Additional Labels applied to pod spec and workload selector
  extraSelectorLabels: {}
  # -- Additional annotations applied to the pod spec
  extraAnnotations: {}
  # -- Pod Security Context
  securityContext:
    runAsUser: 1024
    runAsGroup: 1024
    fsGroup: 1024
  # -- Pod DNS Config
  dnsConfig: {}
  # -- Pod Tolerations
  tolerations: []
  # -- Pod Node Selector Override (defaults to global.nodeSelector)
  nodeSelector: {}
  # -- Additional Pod Image Pull Secrets (Merged with global.imagePullSecrets)
  imagePullSecrets: []
  # -- ServiceAccount name override
  # @default -- The default ServiceAccount
  serviceAccountName: ""
  # -- Pod Affinity.  Uses `tpl` so must be a string, but supports processing "{{ helm blocks }}" passed through values
  # @default -- .global.affinity
  affinity: {}
  # -- Pod TopologySpreadConstraints.  Uses `tpl` so it must be a string, but supports processing "{{ helm blocks }}" passed through values
  # @default -- .global.topologySpreadConstraints
  topologySpreadConstraints: {}


