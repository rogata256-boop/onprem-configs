global:
  image:
    registry: "652914333254.dkr.ecr.us-east-1.amazonaws.com"
  tagCluster: "test-4"
  tagEnvironment: "inf"
  tagNamespace: "" # Default to chart namespace

anchors:
  tagEnv: &Env inf
  fftVersion: &FFTVersion "207"

externalDns:
  enabled: true
  hostnamePrefix: "eks-"

secrets:
  usersJson:
    name: ""

aws:
  enabled: true
  # finchcomputing.com
  acmCertArn: "arn:aws:acm:us-east-1:652914333254:certificate/540d85a3-090f-45b7-8709-4df2968fd5a7"
  additionalAcmCerts:
    - "arn:aws:acm:us-east-1:652914333254:certificate/f6fefd65-05ae-48fe-a352-c9a6b9ff46d7" # finchai.com

finchdb:
  ingress:
    enabled: true
  replicaCount: 1
  pdbMinAvail: 0
  image:
    #repository: finchai/finchdb-lite
    repository: finchai/finchdb-upgrade
    tag: "208.0"
  extraEnv:
    - name: DEBUG
      value: "TRUE"  
  # App Environment Vars
  # -- "TRUE" or "FALSE" - controls whether the startup scripts run or not. Used for debugging
  envSTART: "TRUE"
  # -- FQDN of the redis host. Only used if DMS is "TRUE"
  # @default -- The Redis Service Hostname
  envDMS_REDIS_HOST: "redis-service"
  # -- fft service host for DMS use. Only used if DMS is "TRUE"
  # @default -- The FFT Service Hostname
  envDMS_FFT_HOST: "eks-fft-fdb.finchcomputing.com"
  # -- PORT of the FFT host/ALB. Only used if DMS is "TRUE"
  # @default -- The FFT Service Port
  envDMS_FFT_PORT: "8080"
  # -- "READ", "WRITE"
  envMODE: "WRITE"
  # --- "TRUE" or "FALSE"
  envMIGRATE: "TRUE"
  data:
    dataStorageClassName: "gp3" # mark as default storage class for cluster
    dataStorageClassCreate: false 
    initCopyEnabled: true
    dms:
      enabled: true
    people:
      enabled: true
      mode: "WRITE"
    orgs:
      enabled: true
      mode: "WRITE"
    things:
      enabled: true
      mode: "WRITE"
    dataVolume:
      enabled: true
      mountPath: /opt/FinchDB/data
      volumeSize: "100Gi"
      volumeId: "vol-044a16093d1892b4a"
      volumeAz: "us-east-1a"
      resources: {}            

redis:
  enabled: true
  replicaCount: 1
  pdbMinAvail: 0
