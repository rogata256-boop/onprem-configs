global:
  image:
    registry: "652914333254.dkr.ecr.us-east-1.amazonaws.com"
  tagCluster: "dev-1"
  tagEnvironment: "development"
  tagNamespace: "" # Default to chart namespace

anchors:
  tagEnv: &Env dev-test
  fftVersion: &FFTVersion "212"

externalDns:
  enabled: true
  hostnamePrefix: "fft-"

externalSecrets:
  enabled: true

secrets:
  geocodeStreets:
    externalSecrets:
      remoteId: "/finch/fft/geocode/apikey"
  databaseConnection:
    externalSecrets:
      remoteId: "/finch/fft/dev/fftws-database"
  usageDbConnection:
    externalSecrets:
      remoteId: "/finch/fft/dev/fftws-usage-db"
  minisiteFeedbackDb:
    externalSecrets:
      remoteId: ""
  minisiteGoogleAnalyticsId:
    externalSecrets:
      remoteId: ""
  usersJson:
    name: ""
#    externalSecrets:
#      remoteId: "/finch/fft/prod/fftws/users_json"

baseDomain: "dev.finchai.com"
additionalDomains: ["finchai.com"]

aws:
  enabled: true
  # .dev.finchai.com 
  acmCertArn: "arn:aws:acm:us-east-1:652914333254:certificate/ffe4021c-bc81-4f6b-802e-00c2c1463973"
  additionalAcmCerts:
    - arn:aws:acm:us-east-1:652914333254:certificate/7d817d73-9ce6-4a1f-bd26-159b67566d9f # wildcard all

finchdb:
  enabled: true
  ingress:
    enabled: false
  replicaCount: 1
  pdbMinAvail: 1
  image:
    repository: finchai/finchdb
    tag: "212.2"
  # App Environment Vars
  # -- "TRUE" or "FALSE" - controls whether the startup scripts run or not. Used for debugging
  envSTART: "TRUE"
  # -- FQDN of the redis host. Only used if DMS is "TRUE"
  # @default -- The Redis Service Hostname
  envDMS_REDIS_HOST: ""
  # -- fft service host for DMS use. Only used if DMS is "TRUE"
  # @default -- The FFT Service Hostname
  envDMS_FFT_HOST: ""
  # -- PORT of the FFT host/ALB. Only used if DMS is "TRUE"
  # @default -- The FFT Service Port
  envDMS_FFT_PORT: ""
  # -- "READ", "WRITE"
  envMODE: "READ"
  # --- "TRUE" or "FALSE"
  envMIGRATE: "FALSE"
  # --- "TRUE" or "FALSE"
  envFILTER_ENTITIES: "FALSE"

  data:
    initCopyEnabled: false
    dms:
      enabled: false
    people:
      enabled: true
      mode: "READ"
    orgs:
      enabled: true
      mode: "READ"
    things:
      enabled: true
      mode: "READ"            

redis:
  enabled: false
  replicaCount: 1
  pdbMinAvail: 0

disambig:
  enabled: true
  ingress:
    enabled: false
  replicaCount: 1
  pdbMinAvail: 0
featureextraction:
  enabled: true
  ingress:
    enabled: false
  replicaCount: 1
  pdbMinAvail: 0
geo:
  enabled: true
  ingress:
    enabled: false
  replicaCount: 2
  pdbMinAvail: 1
fft:
  image:
    tag: "17.9.0.8"
  enabled: true
  ingress:
    enabled: true
  replicaCount: 3
  pdbMinAvail: 0
  envEES_TIMEOUT_TAGGERS: "360000"
  envEES_TIMEOUT_PLUGINS: "360000"
  extraEnv:
    - name: GAZ_ETCD_TARGET
      value: "http://etcd.etcd.svc.cluster.local:2379"
fftws:
  nodePort: ""
  enabled: true
  ingress:
    enabled: true
    albScheme: "internal"
  replicaCount: 1
  pdbMinAvail: 0
  metricsRedisHost: "none"  
  redisConnection: "none"
  operationsEnvironment: "dev-1"
  extraAnnotations:
    fluentbit.io/exclude: "false"
  externalArticleExtraction:
    enabled: false
    url: "http://articleextraction-a.dev.local:9191/api/v1/extract-article"
  externalFFT:
    # NOTE: if you are utilizing an external FFT connection you must know how to configure the LANGS_* env vars 
    # according to the external environments configuration / capabilities
    enabled: false    
  diagLogLevel: "info"
  loggingSidecar:
    enabled: true
    graylogHost: "graylog-nonprod-data.finchcomputing.com"
  # This value is passed from the top level values.yaml and
  # is configured via the package-json file
  # packageJsonConfigMapName: ""
