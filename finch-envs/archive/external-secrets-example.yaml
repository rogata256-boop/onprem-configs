## Example external-secrets config
## helm template --values=./finch-envs/external-secrets.yaml test-external-secrets . | yq 'select(.kind == "ExternalSecret")' -y
externalSecrets:
  enabled: true

secrets:
  geocodeStreets:
    externalSecrets:
      remoteId: "/finch/fft/geocode/apikey"
  databaseConnection:
    externalSecrets:
      remoteId: "/finch/operations/rds/dev_fft_ws_connection_string"
