global:
  image:
    registry: "localhost:5000"
  tagCluster: "onprem"
  tagEnvironment: "dev"
  tagNamespace: "" # Default to chart namespace

aws:
  enabled: false
externalDns:
  enabled: false

secrets:
  # Unneeded secrets in fft deployments
  databaseConnection:
    name: ""
  geocodeStreets:
    name: ""
  usageDbConnection:
    name: ""
  minisiteFeedbackDb:
    name: ""
  minisiteGoogleAnalyticsId:
    name: ""

redis:
  enabled: true
  replicaCount: 1
  pdbMinAvail: 0
  affinity: null
  ingress:
    enabled: false

  #Add storage class for redis for persistent storage if desired
  dataVolumeStorageClass: ""
finchdb:
  enabled: true
  replicaCount: 1
  pdbMinAvail: 0
  affinity: null
  ingress:
    enabled: false
  data:
    initCopyEnabled: true
    dms:
      enabled: true
    interestareas:
      enabled: true
  resources:
    requests:
      memory: 40Gi
      cpu: 10
    limits:
      memory: 40Gi
      cpu: 10
disambig:
  enabled: true
  replicaCount: 1
  pdbMinAvail: 0
  affinity: null
  ingress:
