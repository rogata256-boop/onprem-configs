global:
  image:
    registry: "652914333254.dkr.ecr.us-east-1.amazonaws.com"
  tagCluster: "test-4"
  tagEnvironment: "inf"
  tagNamespace: "" # Default to chart namespace

anchors:
  tagEnv: &Env inf
  fftVersion: &FFTVersion "211"

externalDns:
  enabled: true
  hostnamePrefix: "eks-"

secrets:
  usersJson:
    name: ""

aws:
  enabled: true
  # finchcomputing.com
  acmCertArn: "arn:aws:acm:us-east-1:652914333254:certificate/540d85a3-090f-45b7-8709-4df2968fd5a7"
  additionalAcmCerts:
    - "arn:aws:acm:us-east-1:652914333254:certificate/f6fefd65-05ae-48fe-a352-c9a6b9ff46d7" # finchai.com

# disable FDB in FFT chart and reconfig for external FDB installed with another helm chart
finchdb:
  enabled: false
  ingress:
    enabled: false
  replicaCount: 0
  pdbMinAvail: 0           

redis:
  enabled: false
  replicaCount: 0
  pdbMinAvail: 0
disambig:
  enabled: true
  ingress:
    enabled: false
  externalFinchDb:
    enabled: true
    routerUrl: "finchdb-router-service.finchai-fdb.svc.cluster.local"     
  replicaCount: 1
  pdbMinAvail: 0
featureextraction:
  enabled: true
  ingress:
    enabled: false
  replicaCount: 1
  pdbMinAvail: 0
geo:
