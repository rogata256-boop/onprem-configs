  replicaCount: 3
  pdbMinAvail: 0
fft:
  enabled: true
  ingress:
    enabled: true
  replicaCount: 1
  pdbMinAvail: 0
  envEES_TIMEOUT_TAGGERS: "360000"
  envEES_TIMEOUT_PLUGINS: "360000"
fftws:
  nodePort: ""
  enabled: false
  ingress:
    enabled: false
    albScheme: "internet-facing"
  replicaCount: 4
  pdbMinAvail: 0
  redisConnection: "redis-prod-1.prod.local:6379"
  metricsRedisHost: "redis-prod-1.prod.local"
  operationsEnvironment: "prod-a"
  extraAnnotations:
    fluentbit.io/exclude: "false"
  externalArticleExtraction:
    enabled: false
    url: "http://articleextraction-a.prod.local:9191/api/v1/extract-article"
  externalFinchDb:
    enabled: true
    restUrl: "http://finchdb-rest-finchai-fdb.finchcomputing.com:8084" # example url / can use ingress or service in same cluster
    dmsUrl: "http://finchdb-dms-finchai-fdb.finchcomputing.com:8083" # example url / can use ingress or service in same cluster

  externalFFT:
    # NOTE: if you are utilizing an external FFT connection you must know how to configure the LANGS_* env vars 
    # according to the external environments configuration / capabilities
    enabled: false    
  diagLogLevel: "info"
  loggingSidecar:
    graylogHost: "graylog-nonprod-data.finchcomputing.com"
  # This value is passed from the top level values.yaml and
  # is configured via the package-json file
