  nodePort: ""
  enabled: true
  ingress:
    enabled: true
    albScheme: "internet-facing"
  replicaCount: 2
  pdbMinAvail: 1
  redisConnection: "redis-feeds-1-demo.finchcomputing.com:6379"
  metricsRedisHost: "redis-feeds-1-demo.finchcomputing.com"  
  operationsEnvironment: "feeds-va128"
  extraAnnotations:
    fluentbit.io/exclude: "true"
  externalArticleExtraction:
    enabled: true
    url: "http://articleextraction-va128.prod.local:9191/api/v1/extract-article"
  externalFFT:
    # NOTE: if you are utilizing an external FFT connection you must know how to configure the LANGS_* env vars 
    # according to the external environments configuration / capabilities
    enabled: true
    envLANGS_COREF: "en"
    envLANGS_DISAMBIG: "en,nl,de,fr,es,ar,ru,zh"
    envLANGS_DOCSENT: "en"
    envLANGS_DOCSUMM: "en,de,zh"
    envLANGS_ENRICH: "en,nl,de,fr,es,ar,ru,zh"
    envLANGS_ENTSENT: "en"
    envLANGS_ENTSUMM: "en,de,zh"
    envLANGS_HEADLINES: "none"
    envLANGS_INFOEXTRACT: "en"
    envLANGS_RE: "en"
    envLANGS_SALIENCE: "en,de,zh"
    envLANGS_SENTSAL: "en,de,zh"
    envLANGS_TAGS: "en"
    envLANGS_TOPICVECTOR: "en,de,zh"
    envLANGS_TXTCORCASE: "en"
    envLANGS_TXTCORPUNCT: "en"
    envLANGS_TXTCORTOKEN: "en"
    envSUPPORTED_TRANSLATIONS: "de-en,zh-en"
  diagLogLevel: "info"
  loggingSidecar:
    graylogHost: "graylog-prod-data.finchcomputing.com"
  # external FFT url overrides and others...
  envLANGS_GEOCODE_STREETS: "en,de,zh"
  envCONVERT_DOC_SERVICE_URL: "http://convertdoc-service.prod-va128:8080"
  envCORRECT_TEXT_URL: "http://summarization-service.prod-va128:8080/api/v1/correctText"
  envDETECT_LANG_BASE_URL: "http://langdetect-service.prod-va128:8080"
  envENTITY_SEARCH_URL: "none"
  envFDB_REST_URL: "http://finchdb-rest-service.prod-va128:8084"
  envFFT_BASE_URL: "http://fft-service.prod-va128:8080"
  envFINTOP_SENT_URL: "http://fintopic-service.prod-va128:8080/predictions/financialTopics"
  envGEO_SERVICE_URL: "http://geo-service.prod-va128:80/services" # + /services ? 
  envHEADLINE_GENERATOR_URL: "none"
  envIA_FDB_REST_URL: "none"
  envIA_SERVICE_URL: "http://tagger-service.prod-va128:8181"
  envKB_DMS_URL: "http://finchdb-dms-service.prod-va128:8083"
