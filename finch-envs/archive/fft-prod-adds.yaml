global:
  image:
    registry: "559100300467.dkr.ecr.us-east-1.amazonaws.com"
  tagCluster: "prod-3"
  tagEnvironment: "feeds"
  tagNamespace: "" # Default to chart namespace

anchors:
  tagEnv: &Env feeds
  fftVersion: &FFTVersion "204"

externalDns:
  enabled: true
  hostnamePrefix: "eks-"

secrets:
  usersJson:
    name: ""

aws:
  enabled: true
  acmCertArn: "arn:aws:acm:us-east-1:559100300467:certificate/509ef353-5c1e-405b-96c6-d384bdf1ca19" # finchcomputing.com
  additionalAcmCerts:
    - "arn:aws:acm:us-east-1:559100300467:certificate/d2a4f73e-4f6e-40d3-a8a7-3ab9085af547" # finchai.com

finchdb:
