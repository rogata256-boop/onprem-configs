global:
  image:
    registry: "652914333254.dkr.ecr.us-east-1.amazonaws.com"
  tagCluster: "dev-1"
  tagEnvironment: "fdb-ops-1"
  tagNamespace: "" # Default to chart namespace

baseDomain: "dev.finchai.com"
additionalDomains: []

anchors:
  tagEnv: &Env fdb-ops
  fftVersion: &FFTVersion "221"

externalDns:
  enabled: true
  #hostnamePrefix: ""

externalSecrets:
  enabled: true

secrets:
  geocodeStreets:
    externalSecrets:
      remoteId: "/finch/fft/geocode/apikey"
  databaseConnection:
    externalSecrets:
      remoteId: "/finch/fft/dev-1/fftws/database_connection"
  usageDbConnection:
    externalSecrets:
      remoteId: "/finch/fft/dev/fftws-usage-db"
  fftDemositeFeedbackDb:
    externalSecrets:
      remoteId: "/finch/fft/dev/feedback-db"
  fftDemositeGoogleAnalyticsId:
    externalSecrets:
      remoteId: "/finch/analyst/google/analytics/key"
  usersJson:
    name: ""
  sslCert:
    name: ""
  usersLicense:
    name: ""

aws:
  enabled: true
  acmCertArn: "arn:aws:acm:us-east-1:652914333254:certificate/ffe4021c-bc81-4f6b-802e-00c2c1463973" #dev.finchai.com
  additionalAcmCerts: []
  albSchemeDefault: "internal"  

convert_doc:
  enabled: false
  ingress:
    enabled: false

coref:
  enabled: false
  ingress:
    enabled: false

disambig:
  enabled: false
  ingress:
    enabled: false

ees:
  enabled: false
  ingress:
    enabled: false
  envEES_TIMEOUT_TAGGERS: "360000"
  envEES_TIMEOUT_PLUGINS: "360000"

extract_article:
  enabled: false
  ingress:
    enabled: false

feature_extraction:
  enabled: false
  ingress:
    enabled: false

fft_demosite:
  enabled: false
  ingress:
    enabled: false

fft_ws:
  nodePort: ""
  enabled: false
  ingress:
    enabled: false
