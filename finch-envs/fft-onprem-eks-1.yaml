fft_demosite:
  nodePort: ""
  enabled: true
  image:
    tag: "4.27.0"
  ingress:
    enabled: true
    albScheme: "internal" #"internet-facing" #"internal"
  replicaCount: 1
  pdbMinAvail: 0
  env:
    # Required: browser-accessible URL of the FFT web service API.
    # Must be reachable from the end-user's browser, not just within the cluster.
    WEB_SERVICE_URL: "" # e.g. "https://fft-api.customer.example.com"

    # On-prem display options
    # Disable the embedded map widget. Recommended for air-gapped or restricted environments.
    MAP_DISABLE: "true"
    # Disable all outbound external URL links in the UI (e.g. news source links).
    # Recommended for environments where browser access to external sites is blocked.
    EXTERNAL_URLS_DISABLE: "true"

    # Maximum number of documents shown in the Recent Documents list.
    MAX_RECENT_DOCS: "12"

    # Mail server configuration. Set MAIL_SERVER_DISABLE to "true" if no SMTP relay is available.
    MAIL_SERVER_DISABLE: "false"
    #MAIL_SERVER_HOST: "smtp.inf.finchai.com"
    #MAIL_SERVER_PORT: "25"
    #MAIL_SERVER_FROM_EMAIL: "no-reply@finchai.com"

    # Contact addresses shown in the demosite UI
    #SUPPORT_EMAIL: "support@finchai.com"
    #SALES_EMAIL: "sales@finchai.com"
    #FEEDBACK_EMAIL: "DisambiguationFeedback@finchcomputing.com"

    # Sentiment model used by the demosite
    #SENTIMENT_MODEL: "financialTopics"

    # Comma-separated list of source languages available for translation
    #SUPPORTED_SOURCE_TRANSLATIONS: "nl,fr,de,es,ru,uk,ar,zh"


fft_ws:
  nodePort: ""
  enabled: true
  # Set to true to enable Keycloak / OIDC auth mode.
  # When true: USER_CONN/GW_USER_CONN=oidc, OIDC_PROVIDER_NAMES/GW_OIDC_PROVIDER=keycloak,
  # LICENSE_CONN=license file path, and users-license secret is mounted instead of users-json.
  useKeycloak: false
  image:
    tag: "11.13.1"
  ingress:
    enabled: true
    albScheme: "internal"
  #  logAllDetail: true
  #  replicaCount: 0
  #  pdbMinAvail: 0
  #  redisConnection: "redis.qa.finchai.com:6379"
  #  metricsRedisHost: "none"
  #  operationsEnvironment: "fft-qa-1"
  #  extraAnnotations:
  #    fluentbit.io/exclude: "true"
  #  diagLogLevel: "info"
  #  loggingSidecar:
  #    enabled: true
  #    graylogHost: "graylog-nonprod-data.inf.finchai.com"
  # Release notes shown in the demosite "i" icon.
  # Drop your package.json into package-info/ at the chart root — Helm creates
  # the ConfigMap automatically. Set to "" to disable.
  packageJsonConfigMapName: "package-json-custom"
  logAllDetail: false
  replicaCount: 1
  pdbMinAvail: 0
  redisConnection: "none" #"qa-valkey-sxi44i.serverless.use1.cache.amazonaws.com:6379"
  metricsRedisHost: "none"
  operationsEnvironment: "fft-qa-1"
  extraAnnotations:
  fluentbit.io/exclude: "true"
  diagLogLevel: "info"
  loggingSidecar:
    enabled: false
    graylogHost: "" #"graylog-nonprod-data.inf.finchai.com"
  resources:
    limits:
      cpu: 512m
      memory: 2Gi
    requests:
      cpu: 512m
      memory: 2Gi
  env:
    #AGENTIC_SERVICE_URL: # defaults to https://agentic-entity-service.<namespace>.svc.cluster.local:443
  #  ARTICLE_EXTRACTOR_URL: "http://eks-extract-article-prod-b.prod-public.finchai.com:9191/api/v1/extract-article"
  #   ssmAuthKeyString: "/finch/fft/qa-1/fft-auth"
    #SENTIMENT_URL: # defaults to https://sentiment-service.<namespace>.svc.cluster.local
    # Server timeout settings — should be tuned relative to ALB idle timeout.
    # ALB idle timeout defaults to 60s; SERVER_IDLE_TIMEOUT_SEC must be greater
    # than the ALB idle timeout to avoid 502 errors on long-running requests.
    SERVER_IDLE_TIMEOUT_SEC: "120"
    SERVER_READ_HEADER_TIMEOUT_SEC: "15"
    SERVER_READ_TIMEOUT_SEC: "300"
    SERVER_WRITE_TIMEOUT_SEC: "900"

  extraEnv:
    - name: REDIS_CA_CERT_URL
      value: "none" #"https://www.amazontrust.com/repository/AmazonRootCA1.pem"
    - name: SSM_AUTH_KEY
      value: 'none' #"/finch/fft/qa-1/fft-auth" #'none'
    - name: REGION
      value: "us-east-1"
    #- name: USE_REDIS_TLS
    #  value: "true"
    #- name: LANGS_TAGS
    #  value: "en"
    - name: TRANS_LANGS
      value: "en,ar,ru,zh"
#    - name: KB_EDIT_URL
#      value:  "http://10.6.16.59:8084"
#    - name: KB_DMS_URL
#      value: "none"
    # Keycloak / OIDC settings — set useKeycloak: true above to activate
    # These override the flag-driven defaults when explicitly set
    # jwtTokenSigningKey: "75ca3dc16fdc7b9433a73116db58b20d"
    # securityCipherKey: "7d635baefa03efa470d8596f7c95224a"
    # jwtTokenMaxAge: "1h"
    # oidcKeycloakAudience: "fft-web"
    # oidcKeycloakClientId: "fft-web"
    # oidcKeycloakClientSecret: "none"
    # oidcKeycloakIssuerUrl: "https://keycloak.fft-qa-1.qa.finchai.com:8443/realms/finchai"
    # oidcKeycloakJwksUrl: "https://keycloak.fft-qa-1.qa.finchai.com:8443/realms/finchai/protocol/openid-connect/certs"
    - name: ENCRYPTED_INPUT
      value: "true"
    # - name: EXTERNAL_URLS_DISABLE
    #   value: "false" 

