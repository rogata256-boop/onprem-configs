# ==============================================================================
# GPU Scheduling
#
# GPU pods (coref, ner_en, relationships, fin_topic_sentiment, tagger_biztop,
# tagger_iptc, ner_de, quotations, trans_ar) must run exclusively on GPU nodes.
#
# Required node group setup:
#   1. Taint each GPU node:
#        kubectl taint nodes <node> nvidia.com/gpu=present:NoSchedule
#      Or set the taint in the EKS managed node group launch template.
#   2. Ensure the NVIDIA device plugin is installed so nvidia.com/gpu resources
#      are advertised (aws-k8s-device-plugin or nvidia-operator).
#
# How exclusivity is achieved:
#   - Taint (NoSchedule) keeps CPU pods off GPU nodes — no toleration, no entry.
#   - nvidia.com/gpu: 1 resource request means at most one GPU pod per GPU.
#     Use single-GPU instance types (g6.2xlarge, g4dn.2xlarge, g5.2xlarge) to
#     guarantee one GPU pod per node.
#   - Pod anti-affinity (AffinityAvoidPodtypeRequireInstance, in values.yaml)
#     prevents two pods of the same pod-type sharing a node.
# ==============================================================================
podTypeResources:
  gpu:
    enabled: true   # Activates nvidia.com/gpu: 1 request/limit for all GPU pods

agentic_entity_services:
  ingress:
    enabled: true
    image:
    tag: "1.1.13"
  replicaCount: 1
  pdbMinAvail: 0
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 80
  env:
    #FFTENRICH_URL: # defaults to https://ees-service.<namespace>.svc.cluster.local:443/enrich/v3
    #KB_URL: # defaults to https://finchdb-service.<namespace>.svc.cluster.local:443/api/v1/collections/{collection}/documents/query
    ENABLE_GEO_TAGGER: "true"

convert_doc:
  ingress:
    enabled: true
  replicaCount: 1
  pdbMinAvail: 0
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 80

# GPU — no HPA (1:1 GPU:pod constraint)
coref:
  enabled: true
  # image:
  #   tag: "1.0.32"
  ingress:
    enabled: true
  replicaCount: 1
  pdbMinAvail: 0
  tolerations:
    - key: "nvidia.com/gpu"
      operator: "Exists"
      effect: "NoSchedule"
  env:
    TS_JOB_QUEUE_SIZE: "8"

disambig:
  enabled: true
  image:
    tag: "1.15.0"
  ingress:
    enabled: true
    tlsEnabled: true
  replicaCount: 1
  pdbMinAvail: 0
  # Note: each disambig pod requests 16 CPU / 31Gi — keep maxReplicas low
  # or ensure sufficient CPU node capacity before raising this limit.
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 2
    targetCPUUtilizationPercentage: 80
  resources:
    limits:
      cpu: 16
      memory: 31Gi
    requests:
      cpu: 16
      memory: 31Gi
  env:
    #     FE_URL: "feature-extraction-service.fft-qa-1.svc.cluster.local"
    #    FDB_URL: "http://finchdb-service.fft-qa-1.svc.cluster.local:8084"
    DISAMBIG_DEBUG: "false"

ees:
  enabled: true
  image:
    tag: "19.10.1"
  ingress:
    enabled: true
  replicaCount: 1
  pdbMinAvail: 0
  # Note: each ees pod requests 8 CPU / 16Gi — scale cautiously.
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 80
  env:
    #ETCD_TARGET: # defaults to https://etcd.<namespace>.svc.cluster.local:2379
    EES_TIMEOUT_TAGGERS: "360000"
    EES_TIMEOUT_PLUGINS: "360000"
    LOCATION_FIND: "true"
    EES_EXCLUDE_TYPES: "ORGANIZATION/TEST,LOCATION,GROUP"
  resources:
    limits:
      cpu: 8
      memory: 16Gi
    requests:
      cpu: 8
      memory: 16Gi

