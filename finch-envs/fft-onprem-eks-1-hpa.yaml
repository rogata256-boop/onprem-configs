# ==============================================================================
# FFT EKS Configuration with Horizontal Pod Autoscaling (HPA)
#
# Based on fft-onprem-eks-1.yaml — adds autoscaling blocks to all stateless,
# CPU-only Deployment workloads.
#
# GPU-bound services (coref, ner_en, relationships, fin_topic_sentiment,
# tagger_biztop, tagger_iptc, ner_de, quotations, trans_ar) are intentionally
# excluded from HPA: each pod consumes one GPU, and pod anti-affinity limits
# one GPU pod per node. Scaling requires adding GPU nodes, not pod replicas.
#
# StatefulSets (finchdb, finchdb_writeable) are also excluded.
#
# Prerequisites:
#   - metrics-server must be installed in the cluster for HPA to function:
#       kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
#   - HPA controller must be running (standard in EKS)
# ==============================================================================

