    #DMS_FDB_REST_HOST: # defaults to https://finchdb-service.<namespace>.svc.cluster.local
    DMS_FDB_REST_PORT: "443"
    #DMS_FFT_HOST: # defaults to https://ees-service.<namespace>.svc.cluster.local


