# ==============================================================================
# FFT On-Premises (Non-EKS / Air-Gapped) Configuration with Horizontal Pod Autoscaling (HPA)
#
# Based on fft-onprem-eks-1-hpa.yaml — adapted for bare-metal / non-EKS Kubernetes
# deployments with no internet access.
#
# Key differences from the EKS HPA variant:
#   - No AWS ALB / ExternalDNS / ExternalSecrets / ACM
#   - All ingresses disabled — services are accessed via NodePort or an
#     on-prem ingress controller configured separately
#   - Image registry points to your local/private registry (not ECR)
#   - Redis must be provided externally (no ElastiCache)
#   - AWS SSM auth key lookup disabled (SSM_AUTH_KEY=none)
#   - REDIS_CA_CERT_URL and REGION omitted (AWS-only, requires internet)
#
# GPU-bound services (coref, ner_en, relationships, fin_topic_sentiment,
# tagger_biztop, tagger_iptc, ner_de, quotations, trans_ar) are intentionally
# excluded from HPA: each pod consumes one GPU, and pod anti-affinity limits
# one GPU pod per node. Scaling requires adding GPU nodes, not pod replicas.
#
# StatefulSets (finchdb, finchdb_writeable) are also excluded.
#
# Prerequisites:
#   - metrics-server must be installed in the cluster for HPA to function.
#     In an air-gapped environment, load the image from your local registry and
#     apply the manifest using the offline copy of components.yaml.
#     Example (online environments only):
#       kubectl apply -f https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
#   - HPA controller is included in standard Kubernetes distributions.
# ==============================================================================

global:
  image:
    # REQUIRED: Set to your local/private container registry.
    # Example: registry: "registry.customer.internal"
    registry: ""
  tagCluster: "onprem"
  tagEnvironment: "fft-onprem"
  tagNamespace: "" # Default to chart namespace

baseDomain: ""
additionalDomains: []

anchors:
  tagEnv: fft-onprem
  fftVersion: "234"

externalDns:
  enabled: false

# ExternalSecrets pulls from AWS SSM / Secrets Manager — disabled for non-EKS
externalSecrets:
  enabled: false

secrets:
  geocodeStreets:
    name: ""
  databaseConnection:
    name: ""
  usageDbConnection:
    name: ""
  fftDemositeFeedbackDb:
    name: ""
  fftDemositeGoogleAnalyticsId:
    name: ""
  usersJson:
    name: "users-json"
  sslCert:
    name: ""
  usersLicense:
    name: ""
  reportsOpenAiKey:
    name: ""
  reportsTavilyKey:
    name: ""

aws:
  enabled: false

# ==============================================================================
# GPU Scheduling
#
# GPU pods (coref, ner_en, relationships, fin_topic_sentiment, tagger_biztop,
# tagger_iptc, ner_de, quotations, trans_ar) must run exclusively on GPU nodes.
#
# Required node setup:
#   1. Taint each GPU node:
#        kubectl taint nodes <node> nvidia.com/gpu=present:NoSchedule
#   2. Ensure the NVIDIA device plugin is installed so nvidia.com/gpu resources
#      are advertised. In air-gapped environments, load the device plugin image
#      from your local registry before applying the daemonset.
#
# How exclusivity is achieved:
#   - Taint (NoSchedule) keeps CPU pods off GPU nodes — no toleration, no entry.
#   - nvidia.com/gpu: 1 resource request means at most one GPU pod per GPU.
#   - Pod anti-affinity (AffinityAvoidPodtypeRequireInstance, in values.yaml)
#     prevents two pods of the same pod-type sharing a node.
#
# Set podTypeResources.gpu.enabled: false if this cluster has no GPU nodes.
# ==============================================================================
podTypeResources:
  gpu:
    enabled: true   # Activates nvidia.com/gpu: 1 request/limit for all GPU pods

agentic_entity_services:
  ingress:
    enabled: false
  replicaCount: 1
  pdbMinAvail: 0
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 80
  env:
    #FFTENRICH_URL: # defaults to https://ees-service.<namespace>.svc.cluster.local:443/enrich/v3
    #KB_URL: # defaults to https://finchdb-service.<namespace>.svc.cluster.local:443/api/v1/collections/{collection}/documents/query
    ENABLE_GEO_TAGGER: "true"

convert_doc:
  ingress:
    enabled: false
  replicaCount: 1
  pdbMinAvail: 0
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 80

# GPU — no HPA (1:1 GPU:pod constraint)
coref:
  enabled: true
  # image:
  #   tag: "1.0.32"
  ingress:
    enabled: false
  replicaCount: 1
  pdbMinAvail: 0
  tolerations:
    - key: "nvidia.com/gpu"
      operator: "Exists"
      effect: "NoSchedule"
  env:
    TS_JOB_QUEUE_SIZE: "8"

disambig:
  enabled: true
  image:
    tag: "1.15.0"
  ingress:
    enabled: false
  replicaCount: 1
  pdbMinAvail: 0
  # Note: each disambig pod requests 16 CPU / 31Gi — keep maxReplicas low
  # or ensure sufficient CPU node capacity before raising this limit.
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 2
    targetCPUUtilizationPercentage: 80
  resources:
    limits:
      cpu: 16
      memory: 31Gi
    requests:
      cpu: 16
      memory: 31Gi
  env:
    DISAMBIG_DEBUG: "false"

ees:
  enabled: true
  image:
    tag: "19.10.1"
  ingress:
    enabled: false
  replicaCount: 1
  pdbMinAvail: 0
  # Note: each ees pod requests 8 CPU / 16Gi — scale cautiously.
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 80
  env:
    #ETCD_TARGET: # defaults to https://etcd.<namespace>.svc.cluster.local:2379
    EES_TIMEOUT_TAGGERS: "360000"
    EES_TIMEOUT_PLUGINS: "360000"
    LOCATION_FIND: "true"
  resources:
    limits:
      cpu: 8
      memory: 16Gi
    requests:
      cpu: 8
      memory: 16Gi

extract_article:
  enabled: true
  image:
    tag: "1.0.12"
  ingress:
    enabled: false
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 80

feature_extraction:
  enabled: true
