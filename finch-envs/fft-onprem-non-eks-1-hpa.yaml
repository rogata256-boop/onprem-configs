    maxReplicas: 3
    targetCPUUtilizationPercentage: 80

fft_demosite:
  # NodePort for direct browser access without an ingress controller.
  # Access the demosite at http://<node-ip>:30080
  nodePort: "30080"
  enabled: true
  image:
    tag: "4.27.0"
  ingress:
    enabled: false
  replicaCount: 1
  pdbMinAvail: 0
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 80
  env:
    # REQUIRED: browser-accessible URL of the FFT web service API.
    # Must be reachable from the end-user's browser, not just within the cluster.
    # Replace with your node IP or hostname and the fft_ws NodePort (default: 30081).
    WEB_SERVICE_URL: "http://fft-node.customer.internal:30081"

    # Disable the embedded map widget. Recommended for air-gapped environments.
    MAP_DISABLE: "true"
    # Disable all outbound external URL links in the UI (e.g. news source links).
    # Recommended for environments where browser access to external sites is blocked.
    EXTERNAL_URLS_DISABLE: "true"

    # Maximum number of documents shown in the Recent Documents list.
    MAX_RECENT_DOCS: "12"

    # Mail server configuration. Set MAIL_SERVER_DISABLE to "true" if no SMTP relay is available.
    MAIL_SERVER_DISABLE: "true"
    #MAIL_SERVER_HOST: "smtp.customer.internal"
    #MAIL_SERVER_PORT: "25"
    #MAIL_SERVER_FROM_EMAIL: "no-reply@customer.internal"

fft_ws:
  # NodePort for direct API access without an ingress controller.
  # Access the API at http://<node-ip>:30081
  nodePort: "30081"
  enabled: true
  image:
    tag: "11.13.1"
  ingress:
    enabled: false
  packageJsonConfigMapName: "package-json-custom"
  logAllDetail: false
  replicaCount: 1
  pdbMinAvail: 0
  autoscaling:
    enabled: true
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 80
  # REQUIRED: Set to your Redis host:port.
  # Redis is required for session sharing across replicas when HPA scales beyond 1.
  # Example: redisConnection: "redis.customer.internal:6379"
  redisConnection: "none"
  metricsRedisHost: "none"
  operationsEnvironment: "fft-onprem"
  loggingSidecar:
    enabled: false
    graylogHost: ""
  resources:
    limits:
      cpu: 512m
      memory: 2Gi
    requests:
      cpu: 512m
      memory: 2Gi
  env:
    KB_DMS_URL: "none"
    SERVER_IDLE_TIMEOUT_SEC: "120"
    SERVER_READ_HEADER_TIMEOUT_SEC: "15"
    SERVER_READ_TIMEOUT_SEC: "300"
    SERVER_WRITE_TIMEOUT_SEC: "900"

  extraEnv:
    # SSM_AUTH_KEY: 'none' disables AWS SSM-based auth key lookup.
    - name: SSM_AUTH_KEY
      value: 'none'
    - name: MAX_REQUEST_SIZE_KB
      value: "2024"
    - name: TRANS_LANGS
      value: "en,ar,ru,zh"
    # NOTE: REDIS_CA_CERT_URL and REGION are intentionally omitted.
    # REDIS_CA_CERT_URL downloads an Amazon Root CA cert from the internet.
    # REGION is not required outside of AWS.
    - name: ENCRYPTED_INPUT
      value: "true"

# StatefulSet — no HPA
finchdb:
  enabled: false
  ingress:
    enabled: false
  replicaCount: 1
  pdbMinAvail: 0
  image:
    repository: finchai/finchdb
    tag: "237.4"
  data:
    initCopyEnabled: false
    dms:
