certificate:
  # -- Set to false to skip creating the tls-certificate Certificate resource (e.g. when sharing a namespace with finch-analyst)
  create: true
  duration: 2160h  # 90 days
  renewBefore: 360h # 15 days
  issuerRef:
    name: internal-ca
    kind: ClusterIssuer
############################################
## Testing config
############################################
testing:
  autodestroy:
    # -- Toggle the autodestroy feature; it will forcibly delete the namespace based on a cron
    enabled: false
    # -- The cron schedule
    cronSchedule: "0 18 * * *"
    # -- The cron timezone
    cronTimeZone: "America/New_York"
    image:
      repository: "bitnami/kubectl"
      tag: "latest"
  cronscaledown:
    # -- Toggle the cronscaledown feature; it will set every deployment to 0 replicas at the scheduled time
    enabled: false
    # -- The cron schedule
    cronSchedule: "0 18 * * *"
    # -- The cron timezone
    cronTimeZone: "America/New_York"
    image:
      repository: "bitnami/kubectl"
      tag: "latest"
  cronscaleup:
    # -- Toggle the cronscaleup feature; it will set every deployment to 1 replicas at the scheduled time
    enabled: false
    # -- The cron schedule
    cronSchedule: "0 8 * * *"
    # -- The cron timezone
    cronTimeZone: "America/New_York"
    image:
      repository: "bitnami/kubectl"
      tag: "latest"
  cronunsuspend:
    # -- Toggle the cronunsuspend feature; it will un-suspend listed cronjobs at the scheduled time
    enabled: false
    # -- The cron schedule for execution; typically scheduled to run after the cronscaledown
    cronSchedule: "15 18 * * *"
    # -- The cron timezone
    cronTimeZone: "America/New_York"
    # -- The list of cronjobs to unsuspend
    cronsToUnsuspend:
      - "cronscaledown-namespace"
    image:
      repository: "bitnami/kubectl"
      tag: "latest"

# -- Bitnami etcd subchart overrides
# client.secureTransport=false: disables TLS on the client port (2379); services connect
# via http://. Avoids cert-manager dependency on fresh namespaces.
# peer.secureTransport=false: pod IPs are dynamic and cannot be added to cert SANs at
# issuance time; etcd's VerifyPeerCertificate verifies the connecting IP against cert
# SANs causing all peer connections to fail. Peer comms are intra-cluster so TLS is
# not required at that layer.
# -- Keycloak (optional, identity and access management)
# Custom templates in templates/keycloak/ handle keycloak + postgres deployments.
keycloak:
  enabled: false
  replicaCount: 0
  image:
    registry: "767397961866.dkr.ecr.us-east-1.amazonaws.com"
    repository: "finchai/keycloak"
    tag: "v0.1.10"
    pullPolicy: IfNotPresent
  postgresql:
    image:
      registry: "767397961866.dkr.ecr.us-east-1.amazonaws.com"
      repository: "finchai/postgres"
      tag: "latest"
      pullPolicy: IfNotPresent
  app:
    enabled: true
    replicaCount: 1
    tlsEnabled: true
    tlsSecretName: "tls-secret"
    ingress:
      enabled: false
      extraAnnotations: {}
      tlsSecretName: ""
    certificate:
      enabled: false
      duration: "8760h"
      renewBefore: "720h"
      issuerRef:
        name: "internal-ca-issuer"
        kind: "ClusterIssuer"
    env:
      hostname: ""
      dbService: ""
      dbName: "bitnami_keycloak"
      dbUsername: "bn_keycloak"
      db: "postgres"
      httpEnabled: "true"
      proxyHeaders: "xforwarded"
      fftApiClientSecret: "none"
      faApiClientSecret: "none"
      afApiClientSecret: "none"
      frmApiClientSecret: "none"
      faUrl: ""      # explicit override; auto-computed from baseDomain + hostnamePrefix/Suffix when externalDns.enabled
      faIngressHostname: "analyst-api"  # FA ingress hostname segment (before suffix + baseDomain)
      tasrUrl: ""
      fftUrl: ""     # explicit override; auto-computed from fft_ws ingress hostname when fft_ws.enabled + externalDns.enabled
      smtpServer: ""
      adminUser: "admin"
      adminPassword: "admin123"
    extraEnv: []
    postgres:
      username: "bn_keycloak"
      database: "bitnami_keycloak"
      password: "keycloak123"
      postgresPassword: "keycloak123"
      storageSize: "8Gi"
      port: "5432"
      tlsEnabled: false
      tlsSecretName: "tls-secret"
      tlsCaSecretName: ""
      sslMode: "require"
      ldapEnabled: false
      logHostname: false
      logConnections: false
      logDisconnections: false
      pgauditLogCatalog: "off"
      clientMinMessages: "error"
      sharedPreloadLibraries: "pgaudit"
      debug: "false"
      extraEnv: []

etcd:
  auth:
    client:
      secureTransport: false
      enableAuthentication: false
    peer:
      secureTransport: false
      enableAuthentication: false
