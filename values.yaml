    enabled: true
    graylogHost: ""
    image:
      repository: finchai/logging-sidecar
      tag: "2.1.7"
    resources:
      requests:
        memory: 4Gi
        cpu: 512m
      limits:
        memory: 4Gi
        cpu: 512m
  tagTag: fftws
  resources:
    requests:
      memory: "4Gi"
      cpu: "512m"
    limits:
      memory: "4Gi"
      cpu: "512m"
  # -- Enable Keycloak / OIDC auth mode.
  # When true: USER_CONN/GW_USER_CONN default to "oidc", OIDC_PROVIDER_NAMES/GW_OIDC_PROVIDER default to "keycloak",
  # LICENSE_CONN defaults to license file path, and users-license secret is mounted instead of users-json.
  # Individual env vars can still be overridden explicitly in a finch-envs file.
  useKeycloak: false

  # -- Optional overrides of environment variables per deployment
  env:
    ARTICLE_EXTRACTOR_URL: ""
    # -- Keycloak / OIDC settings (all default to "none" unless useKeycloak: true sets them)
    # @default -- driven by useKeycloak flag: "oidc" when true, file-based when false
    userConn: ""
    # @default -- driven by useKeycloak flag: "oidc" when true, file-based when false
    gwUserConn: ""
    # @default -- driven by useKeycloak flag: "keycloak" when true, "none" when false
    oidcProviderNames: ""
    # @default -- driven by useKeycloak flag: "keycloak" when true, "none" when false
    gwOidcProvider: ""
    # @default -- driven by useKeycloak flag: license file path when true, "none" when false
    licenseConn: ""
