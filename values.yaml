fft_ws:
  # -- Toggle deployment of fft_ws
  enabled: false

  # -- Nodeport used by the service to make fft_ws externally accessible at the service level
  nodePort: "30081"
  # -- exposed ingress and service port
  portExternal: "8080"
  # -- port used within the container
  portContainer: "8080"

  # -- Enable TLS on the fft-ws server (end-to-end encryption).
  # When true: fft-ws serves HTTPS on port 8443, the Service exposes port 443,
  # and the ALB ingress is configured with backend-protocol: HTTPS.
  # When false (default): fft-ws serves plain HTTP on port 8080; TLS is
  # terminated at the ALB using the ACM certificate.
  serverTlsEnabled: false

  # -- Configure the package version of FFT
  packageVersion: *FFTVersion

  ingress:
    # -- Toggle fft_ws ingress
    enabled: true
    # -- Ingress healthcheck path
    healthcheckPath: "/api/v1/admin/health"
    # -- Scheme of the ALB (internal or internet-facing)
    albScheme: "internal"
    # -- ALB Load Balancer Attributes annotation
    albLoadBalancerAttributes: "idle_timeout.timeout_seconds=4000"
    # -- TLS Enabled
    tlsEnabled: true

  # -- Log level [debug, info, warn, error]
  logLevel: "info"

  # -- Whether gateway logging should be enabled or not. Disabling logging in this manner guarantees no uploaded documents will be written plaintext in logs
  enableLogging: true

  # -- The path into which the users-json secret will inject the users.json file in the fft_ws container, no trailing slash
  usersJsonSecretFilepath: "/opt/fft_ws/users-json"
  # -- The name of the ConfigMap containing the package.json configuration; set to "" to disable mounting.  Requires a ConfigMap with .data["package.json"] containing the package.json configuration
  packageJsonConfigMapName: "package-json-233"
  # -- The path into which the ConfigMap will inject the package.json configuration in the fft_ws container, no trailing slash
  packageJsonConfigMapFilepath: "/opt/fft_ws/package-json"

  # -- Override the redis host:port; defaults to the local redis unless it's disabled
  redisConnection: ""

  # -- Configure the metrics redis host, used for rate-limiting clients; defaults to none
  metricsRedisHost: ""

  # -- Configure the Operations Environment for metrics prefixes; defaults to namespace
  operationsEnvironment: ""

  replicaCount: 0
  pdbMinAvail: 1
