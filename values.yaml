#@ignored
anchors:
  # Also update .fft_ws.packageJsonConfigMapName; anchors don't support interpolation
  fftVersion: &FFTVersion "233"
  topologySpreadConstraints:
    # Prefer to be scheduled in an availability zone different from other pods in the same deployment, but not a hard requirement
    preferDifferentZone: &TSCPreferDifferentZone |
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app: {{ .appName }}
            component: {{ .componentName }}
  affinity:
    # Requires amd64 gpu, requires the node not be flagged by karpenter as a GPU or Accelerator node
    standard: &AffinityKarpenterAvoidGpuAndAccelerator |
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: kubernetes.io/arch
                  operator: In
                  values:
                    - amd64
                - key: karpenter.k8s.aws/instance-accelerator-count
                  operator: DoesNotExist
                - key: karpenter.k8s.aws/instance-gpu-count
                  operator: DoesNotExist
    # require standard and not fargate
    standardNotFargate: &AffinityKarpenterAvoidGpuAndAccelAndFargate |
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: kubernetes.io/arch
                  operator: In
                  values:
                    - amd64
                - key: karpenter.k8s.aws/instance-accelerator-count
                  operator: DoesNotExist
                - key: karpenter.k8s.aws/instance-gpu-count
                  operator: DoesNotExist
                - key: eks.amazonaws.com/compute-type
                  operator: NotIn
                  values:
                  - fargate
                - key: eks-managed
                  operator: NotIn
                  values:
                  - "true"
    # Require a specific instance type, configured with .Values.<svc>.instanceType
    # Require to not be scheduled on nodes with pods of the same type, configured with .Values.svc.podType
    avoidPodtypeRequireInstance: &AffinityAvoidPodtypeRequireInstance |
      podAntiAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchExpressions:
            - key: pod-type
              operator: In
              values:
              - {{ .podType }}
          topologyKey: "kubernetes.io/hostname"
          namespaceSelector:
            # Forces the selector to look across all namespaces for antiaffinity
            matchExpressions:
            - key: "kubernetes.io/metadata.name"
              operator: "Exists"
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
          - matchExpressions:
            - key: kubernetes.io/arch
              operator: In
              values:
              - amd64
            {{- with .instanceType }}
            - key: node.kubernetes.io/instance-type
              operator: In
              values:
              - {{ . }}
            {{- end }}
            {{- with .instanceFamily }}
            - key: node.kubernetes.io/instance-family
              operator: In
              values:
              - {{ . }}
            {{- end }}

# -- Global configuration for all services
global:
  # -- Any image pull secrets used with deployments.  Applies to all services, overridable at the service level
  imagePullSecrets: []
  #imagePullSecrets:
  #- foo

  image:
    ## Image Components example:
    ## registry.k8s.io/kube-state-metrics/kube-state-metrics:v2.10.1
    #  ^^^^^^^^^^^^^^^ - Registry
    #                 ^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^^ - Repository
    #                                                        ^^^^^^^ - Tag
    # -- A global image registry to use for all services.  Will prefix _every_ image used in this helm chart.  Not overridable at the service level.  Can include path prefixes if using a namespaced mirror/cache for all images.
    registry: ""

  # -- nodeSelector config that will be included with every service.  Overridable at the service level
  nodeSelector:
    kubernetes.io/os: linux
  #nodeSelector: {}

  # -- Default tag environment for all services; used for log prefixes
  # @default -- The deployment Namespace
  tagEnvironment: ""

  # -- Default tag namespace for all services; used for graylog
  # @default -- The deployment Namespace
  tagNamespace: ""

  # -- Default tag cluster for all services; used for graylog
  # @default -- empty
  tagCluster: ""

  # -- Additional labels applied to pod specs for all services
  extraPodLabels: {}

  # -- Default affinity applied to Deployments when otherwise unconfigured
  # @default -- Avoid GPU and Accelerator nodes as flagged by Karpenter
  affinity: *AffinityKarpenterAvoidGpuAndAccelerator

  # -- Default topologySpreadConstraints applied to Deployments when otherwise unconfigured
  # @default -- none
  topologySpreadConstraints: {}
  #topologySpreadConstraints: *TSCPreferDifferentZone

# -- An optional overlay of resource limits/requests for services with podType matching the key
# @default -- no additional resources included
podTypeResources:
  gpu:
    # -- Toggle the inclusion of GPU resource requests/limits and tolerations when podType == "gpu"
    enabled: false
    # -- Tolerations automatically added to all pods with podType == "gpu" when enabled.
    # Matches the standard nvidia.com/gpu taint applied to GPU nodes.
    tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
    # -- The default GPU resource limits for all services of podType "gpu"
    # @default -- Require "nvidia.com/gpu: 1"; only works if nvidia-operator/nvidia-device-plugin is installed
    resources:
      limits:
        nvidia.com/gpu: "1"
      requests:
        nvidia.com/gpu: "1"
  inf:
    # -- Toggle the inclusion of Neuron resource requests/limits and tolerations when podType == "inf"
    enabled: false
    # -- Tolerations automatically added to all pods with podType == "inf" when enabled.
    # Matches the standard aws.amazon.com/neuron taint applied to Inferentia nodes.
    tolerations:
      - key: aws.amazon.com/neuron
        operator: Exists
        effect: NoSchedule
    # -- The default Neuron resource limits for all services of podType "inf"
    # @default -- Require "aws.amazon.com/neurondevice: 1"; only works if neuron-device-plugin is installed
    resources:
      limits:
        ## Deprecated
        aws.amazon.com/neuron: "1"
        ## Pending https://github.com/aws/karpenter-provider-aws/issues/3555
        #aws.amazon.com/neurondevice: "1"
      requests:
        ## Deprecated
        aws.amazon.com/neuron: "1"
        ## Pending https://github.com/aws/karpenter-provider-aws/issues/3555
        #aws.amazon.com/neurondevice: "1"

# -- Additional helm charts for configuration of optional functionality and features within fft 
subcharts:
  # -- a distributed key-value store, required when writable finchdb is enabled, or when ees custom entities are supported
  etcd:
    enabled: false
  # -- an optional ingress controller used to support load balancers in non-aws / onprem deployments
  nginx:
    enabled: false

# -- Collections of optional pre / post deployment jobs used to support fft
jobs:
  # -- TODO: Jordan to write description for this
  kubectl:
    enabled: true
    image:
      repository: bitnami/kubectl
      tag: "latest"
  # -- optionally mount the latest custom geo gaz for extraction of geo entities of interest    
  geo_job:
    enabled: false

# -- The base domain for the deployment, ie: finchcomputing.com
baseDomain: "finchcomputing.com"

# -- List of additional domains for the deployment used for public resources.  ie: ["finchai.com"]. Only applies to demosite, fft_ws
additionalDomains: ["finchai.com"]

# -- Default Kubernetes ingressClassName for all services. Override per-service via ingress.className.
# For on-prem/nginx deployments set this to "nginx" once instead of per-service.
# aws.enabled=false deployments should set this to match their ingress controller.
ingressClassNameDefault: "alb"

# -- Configuration to add External DNS annotations to Ingress
# @default -- enabled
externalDns:
  # -- Toggle the presumption of External DNS
  enabled: true

  # -- A prefix added to every hostname used by External DNS; "NAMESPACE" will be replaced with the namespace
  hostnamePrefix: ""
  # -- A suffix added to every hostname used by External DNS; "NAMESPACE" will be replaced with the namespace
  hostnameSuffix: "-NAMESPACE"
  # -- TTL (in seconds) for DNS records created by External DNS. Leave empty to use the ExternalDNS controller default.
  ttl: ""

# -- All the configuration for external-secrets
# @default -- disabled
externalSecrets:
  enabled: false
  # -- The default secretStoreRef for external-secrets
  secretStoreRef:
    name: aws-parameter-store
    kind: ClusterSecretStore

# -- All the configuration for AWS-specific deployments
# @default -- disabled
aws:
  # -- Enable the aws configurations for the chart
  enabled: false
  # -- The AWS ARN for the Amazon Certificate Manager (ACM) Cert
  acmCertArn: ""
  # -- Any additional ACM Certs that you want included on public resources. Only applies to demosite, fft_ws
  additionalAcmCerts: []
  # -- Default ALB scheme when unset by application (internal or internet-facing)
  albSchemeDefault: "internal"

  # -- Create storage classes for EBS volumes
  createStorageClasses: true

  # -- Conditionally attach the ingress annotations for AWS Load Balancer configuration.  See [the docs](https://kubernetes-sigs.github.io/aws-load-balancer-controller/v2.2/guide/ingress/annotations/)
  #loadBalancerEnabled: false

# -- All the configuration for onprem specific deployments
onprem:
  # -- Enable the onprem configurations for the chart
  enabled: false
  # -- certificate mounting filepath for fft_ws, and fft_demosite if tls is configured
  sslCertSecretFilepath: "/usr/local/share/ca-certificates/"
 
# -- Configure the chart to use nginx ingress 
nginxIngress:
  enabled: false
  controller:
    replicaCount: 2
    ingressClass: nginx
    service:
      type: LoadBalancer

secrets:
  reportsOpenAiKey:
    name: "reports-openai-key"
    key: "OPENAI_API_KEY"
    externalSecrets:
      remoteId: ""
  reportsTavilyKey:
    name: "reports-tavily-key"
    key: "TAVILY_API_KEY"
    externalSecrets:
      remoteId: ""
  geocodeStreets:
    # -- Name of the Secret containing the geocode Streets API key; set to empty string "" to disable
    name: "fft-geocode-apikey-secret"
    # -- Key in the Secret containing the geocode Streets API key
    key: "apikey"
    externalSecrets:
      # -- ID of the remote secret used to pull via external-secrets; setting to "" disables external-secrets for this secret
      remoteId: ""
      # -- Property within the remote secret to set as the ExternalSecret .key value
      # @default -- the whole contents
      remoteSubkey: ""
      # -- ExternalSecrets secretStoreRef field
      # @default -- .externalSecrets.secretStoreRef
      secretStoreRef: {}


  databaseConnection:
    # -- Name of the Secret containing the Database connection string, used by fft_ws for DATABASE_CONNECTION env; set to empty string "" to disable
    name: "" #"fft-ws-database-connection-secret"
    # -- Key in the Secret containing the Database connection string
    key: "connection-string"
    externalSecrets:
      # -- ID of the remote secret used to pull via external-secrets; setting to "" disables external-secrets for this secret
      remoteId: ""
      # -- Property within the remote secret to set as the ExternalSecret .key value
      # @default -- the whole contents
      remoteSubkey: ""
      # -- ExternalSecrets secretStoreRef field
      # @default -- .externalSecrets.secretStoreRef
      secretStoreRef: {}


  usageDbConnection:
    # -- Name of the Secret containing the Usage DB connection string, used by fft_ws for USAGE_DB_CONN env; set to empty string "" to disable
    name: "fft-ws-usage-db-conn-secret"
    # -- Key in the Secret containing the Usage DB connection string
    key: "connection-string"
    externalSecrets:
      # -- ID of the remote secret used to pull via external-secrets; setting to "" disables external-secrets for this secret
      remoteId: ""
      # -- Property within the remote secret to set as the ExternalSecret .key value
      # @default -- the whole contents
      remoteSubkey: ""
      # -- ExternalSecrets secretStoreRef field
      # @default -- .externalSecrets.secretStoreRef
      secretStoreRef: {}

  fftDemositeFeedbackDb:
    # -- Name of the Secret containing the fft_demosite Feedback Database connection string, used by demosite for FEEDBACK_DB env; set to empty string "" to disable
    name: "fft-demosite-feedback-db-secret"
    # -- Key in the Secret containing the fft_demosite Feedback Database connection string
    key: "connection-string"
    externalSecrets:
      # -- ID of the remote secret used to pull via external-secrets; setting to "" disables external-secrets for this secret
      remoteId: ""
      # -- Property within the remote secret to set as the ExternalSecret .key value
      # @default -- the whole contents
      remoteSubkey: ""
      # -- ExternalSecrets secretStoreRef field
      # @default -- .externalSecrets.secretStoreRef
      secretStoreRef: {}

  fftDemositeGoogleAnalyticsId:
    # -- Name of the Secret containing the fft_demosite Google Analytics ID; set to empty string "" to disable
    name: "fft-demosite-google-analytics-id-secret"
    # -- Key in the Secret containing the fft_demosite Google Analytics ID
    key: "apikey"
    externalSecrets:
      # -- ID of the remote secret used to pull via external-secrets; setting to "" disables external-secrets for this secret
      remoteId: ""
      # -- Property within the remote secret to set as the ExternalSecret .key value
      # @default -- the whole contents
      remoteSubkey: ""
      # -- ExternalSecrets secretStoreRef field
      # @default -- .externalSecrets.secretStoreRef
      secretStoreRef: {}

  usersJson:
    # -- Set to false to skip the helm pre-flight check that usersJson.name is configured (e.g. for OIDC deployments that don't use a users.json k8s secret)
    required: true
    # -- The name of the users-json secret in the deployment namespace containing the users.json file; set to "" to disable mounting
    name: "users-json"
    externalSecrets:
      # -- ID of the remote secret used to pull via external-secrets; setting to "" disables external-secrets for this secret
      remoteId: ""
      # -- Property within the remote secret to set as the ExternalSecret .key value
      # @default -- the whole contents
      remoteSubkey: ""
      # -- ExternalSecrets secretStoreRef field
      secretStoreRef:
        # -- users.json is binary data, which is incompatible with parameterstore
        name: aws-secrets-manager
        kind: ClusterSecretStore

  sslCert:
    # -- Name of the Secret containing the ssl cert for onprem deployments, used by fft_ws, fft_demosite for tls; set to empty string "" to disable
    name: "fft-ca-cert-secret"
    # -- Key in the Secret containing the ca cert string
    key: "ca-cert"
    externalSecrets:
      # -- ID of the remote secret used to pull via external-secrets; setting to "" disables external-secrets for this secret
      remoteId: ""
      # -- Property within the remote secret to set as the ExternalSecret .key value
      # @default -- the whole contents
      remoteSubkey: ""
      # -- ExternalSecrets secretStoreRef field
      # @default -- .externalSecrets.secretStoreRef
      secretStoreRef: {}

  usersLicense:
    # -- The name of the users-license secret in the deployment namespace containing the users.license file; set to "" to disable mounting
    name: "users-license"
    externalSecrets:
      # -- ID of the remote secret used to pull via external-secrets; setting to "" disables external-secrets for this secret
      remoteId: ""
      # -- Property within the remote secret to set as the ExternalSecret .key value
      # @default -- the whole contents
      remoteSubkey: ""
      # -- ExternalSecrets secretStoreRef field
      secretStoreRef:
        # -- users.license is binary data, which is incompatible with parameterstore
        name: aws-secrets-manager
        kind: ClusterSecretStore

