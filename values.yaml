    oidcKeycloakResourceClaimName: "resource_access"
    oidcKeycloakRoleClaimName: "roles"
    jwtTokenMaxAge: "2m"
    jwtTokenSigningKey: "none"
    securityCipherKey: "none"
    oidcKeycloakAudience: "none"
    oidcKeycloakClientId: "none"
    oidcKeycloakClientSecret: "none"
    oidcKeycloakIssuerUrl: "none"
    oidcKeycloakJwksUrl: "none"
    oidcKeycloakScopes: "openid,profile,email,roles,basic"
